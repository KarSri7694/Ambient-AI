; Ambient AI example configuration
; Copy this file to config.ini, then replace model names and paths with presets
; that exist in models_preset.ini. Boolean values are true or false.

[runtime]
; llama.cpp router base URL. It must expose /v1 and /models/load endpoints.
api_base_url = http://127.0.0.1:8080
; Must match --api-key on llama-server. Do not put a production secret in Git.
api_key = testkey
; Safe fallback model when a specialized role below has no configured value.
default_model = 
; All databases, plain captures, chat history, and runtime state live here.
user_data_dir = .ambient_data
; Seconds without keyboard/mouse input before the user is considered idle.
; Idle changes resource priority; it does not create intent or start work alone.
user_idle_threshold_seconds = 20
; MCP server definition file. Set blank to start without MCP tools.
mcp_config_path = mcp.json
; Enables verbose diagnostic logging. Avoid this for normal private use.
debug_mode = false
; Legacy compatibility setting. The durable coordinator evaluates context continuously.
always_on = false
; Legacy queue behavior. Keep false; scheduled work uses the policy gateway.
perform_queue_tasks = false

[models]
; Small text-only model kept resident when memory is healthy. Prefer <=1.5B Q4,
; or a similarly small model such as 0.8B Q8. Leave blank for on-demand chat.
lightweight_chat_model =
; Fast VLM used later to interpret queued screenshots under a vision lease.
passive_observer_model = 
; Larger VLM for difficult screenshots. It remains unloaded unless explicitly selected.
full_passive_observer_model = 
; Text model for follow-up reasoning about an existing visual observation.
passive_followup_model =
; Text model that updates profile facts and preferences from confirmed evidence.
user_biodata_model = 
; Main judgment/research model for qualifying proactive opportunities.
followup_execution_model = 
; Model used to turn completed work into user-facing reports.
reporter_model = 
; Model for explicit Todoist tasks when that integration is enabled.
todoist_execution_model = 
; Model for optional memory reflection work.
reflection_model = 
; Model for reasoning over transcripts after deferred ASR completes.
transcript_processing_model = 
; Model temporarily loaded for delegated browser work.
browser_agent_model = 
; Normal on-demand chat model. The lightweight model handles ordinary chat first.
chat_model = 

[resource_governor]
; capture_only = capture and queue only; balanced = recommended; aggressive =
; lower safety reserves and more background inference during active use.
preset = balanced
; Evict a resident model when free RAM is below both critical boundaries.
; Admission uses measured RAM/VRAM before and after loading; there are no per-model estimates.
critical_ram_mb = 2048
critical_ram_percent = 15
; Healthy memory must remain stable this long before the tiny model reloads.
recovery_stable_seconds = 30
; Minimum spacing between automatic load/unload transitions to prevent thrashing.
transition_cooldown_seconds = 60
; Maximum duration and event count in one background inference lease.
batch_max_seconds = 90
batch_max_events = 8
; Delay before reconsidering work that was denied because resources were unsafe.
defer_seconds = 30
; Maximum queued audio duration transcribed in one ASR resource window.
asr_batch_audio_seconds = 300

[browser]
; MCP server name in mcp.json that is exposed only to the browser agent.
server_name = playwright
; Hard timeout for one delegated browser task.
task_timeout_seconds = 180
; false shows a browser window; true runs the browser without a visible window.
headless = false
; Persistent browser profile for sessions/cookies. Protect this directory.
persistent_profile_dir = .ambient_data/browser/profile
; Browser tools that must never be exposed to the agent.
denied_tools_json = ["browser_run_code", "browser_run_code_unsafe"]

[chat]
; Durable dashboard conversation database.
db_path = .ambient_data/database/chat.db
; Maximum completed messages inserted into a new model prompt.
history_message_limit = 40
; How often partial streamed responses are checkpointed to SQLite.
stream_checkpoint_seconds = 0.25
; Keep a chat model available this long after a response before settling residency.
response_wait_seconds = 120

[passive_observer]
; Enables lightweight active-use screen capture. No VLM is loaded by capture itself.
enabled = false
; Legacy in-memory queue size; durable coordinator mode persists captures directly.
screenshot_queue_maxlen = 180
; Screenshots at or above this similarity are coalesced rather than reprocessed.
ssim_threshold = 0.92
; Number of recent downscaled images used for similarity comparison.
ssim_compare_count = 4
; Seconds between lightweight UI metadata and screenshot captures.
capture_interval_seconds = 10
; Capture UI Automation text/title/URL before deferred vision analysis.
fast_routing_enabled = true
; Similarity boundary used when deciding whether fuller vision analysis is useful.
full_vlm_ssim_threshold = 0.70
; Retry count for malformed fast-observer model responses.
fast_model_retry_count = 2
; UI Automation extraction mode used by UIATAdapter.
uiat_mode = screen_content
; Never capture these processes/apps. Matching is case-insensitive.
ignore_apps_json = ["1Password", "Signal"]
; Never capture pages on these domains or their subdomains.
ignore_domains_json = ["bank.example"]
; Apps that may use the full vision model when a resource lease permits it.
always_full_apps_json = []
; Domains that may use the full vision model when a resource lease permits it.
always_full_domains_json = []

[ambient]
; These describe enabled durable event sources. Capture controls still take priority.
continuous_transcript_processing = true
continuous_visual_processing = true
; Preferred event grouping size for compatible handlers.
event_batch_size = 2
; Time before a crashed event lease can be reclaimed.
event_lease_seconds = 180
; Upper bound for compatible event handlers.
handler_timeout_seconds = 180
; Per-type backlog ceiling for compatible producers; raw capture files are retained.
max_pending_per_event_type = 120

[autonomy]
; shadow creates proposed inbox cards only; active can research and perform
; policy-permitted reversible actions; disabled stops opportunity processing.
mode = shadow
; Product-level behavior switches retained for policy configuration.
allow_notifications = true
allow_reversible_actions = true
; Timeout and approval lifetime for bounded tools/actions.
tool_timeout_seconds = 45
approval_ttl_minutes = 30
; Hard rate limits for proactive work.
max_tool_calls_per_hour = 120
max_web_queries_per_day = 60
max_inbox_items_per_day = 30
max_interruptions_per_hour = 2
; Lease/retry values for compatible scheduled task workers.
task_lease_seconds = 600
task_retry_delay_seconds = 30
; Optional initial tool-to-capability mappings. Policy remains authoritative.
tool_policy_rules_json = [{"pattern":"capture_screen","capability":"observe","requires_approval":false},{"pattern":"search*","capability":"observe","requires_approval":false},{"pattern":"get_*","capability":"observe","requires_approval":false},{"pattern":"list_*","capability":"observe","requires_approval":false}]

[privacy]
; Folder containing ordinary screenshots, audio, transcripts, and payload files.
capture_root = .ambient_data/captures
; Informational retention contract. Captures remain until manually deleted.
raw_retention = indefinite_plain

[integrations]
; OAuth client and token locations. Secrets should live outside the repository.
google_credentials_path = credentials.json
google_token_path = .ambient_data/integrations/google_token.pickle

[audio]
; Hugging Face token for gated diarization models; environment/credential storage is safer.
hf_token =
; VAD-created audio segments arrive here before being moved to the capture folder.
uploads_dir = .ambient_data/uploads
; Final transcript output directory before it is moved to the capture folder.
transcriptions_dir = .ambient_data/transcriptions
; Audio preprocessing output and temporary working directories.
cleaned_audio_dir = .ambient_data/cleaned_audio
temp_audio_dir = .ambient_data/temp_audio
; Speaker identity database.
voice_db = .ambient_data/database/voice_database.db
; faster-whisper/CTranslate2 model path used by deferred ASR.
hin2hinglish_model = Hin2Hinglish-ct2/
; Audio chunks shorter than this many seconds are ignored for speaker matching.
min_time_threshold = 0.2

[realtime_audio]
; Must match audio.uploads_dir so the watcher receives completed VAD segments.
uploads_dir = .ambient_data/uploads

[todoist]
; Enable only after TODOIST_API_TOKEN is provided outside this file.
enabled = false
api_token =
project_name = Ambient AI Tasks
project_state_path = .ambient_data/todoist.json

[reflection]
; Optional periodic memory consolidation/task shaping. It is resource-gated.
enabled = false
; daily, interval_hours, or every_idle_cycle.
cadence_mode = daily
interval_hours = 24
max_generated_tasks = 8
max_task_generation_runs = 3
history_path = .ambient_data/reflection/reflection_history.json

[semantic_memory]
; Requires an embedding/reranker server. Keep false for the lowest memory usage.
enabled = false
embedding_api_base_url = http://127.0.0.1:8081
embedding_model = EmbeddingGemma
reranker_api_base_url = http://127.0.0.1:8081
reranker_model = JinaReranker
; Candidate count before reranking, result count after reranking, and sync batch size.
vector_limit = 12
rerank_limit = 6
sync_batch_size = 32
; Network timeout for embedding/reranking calls.
timeout_seconds = 5

[semantic_dedupe]
; Optional model-backed deduplication. Durable ambient capture already performs
; deterministic fingerprint/SSIM coalescing, so false saves memory.
enabled = false
; Leave blank to use runtime.default_model when enabled.
model =
candidate_limit = 8
default_ttl_seconds = 86400
debug_log_reasoning = false

[log_api]
; Local dashboard/API server. It has no login and refuses non-loopback binds.
enabled = true
; Keep this on loopback. Other host values are rejected at startup.
host = 127.0.0.1
port = 8765
; Number of recent log entries kept in memory for dashboard streaming.
buffer_size = 2000

[benchmarking]
; Benchmark results database and case definition directory.
db_path = .ambient_data/database/benchmarking.db
cases_root = benchmarking/cases

[training_data]
; Human-reviewed interaction/training export root and metadata database.
root = .ambient_data/training
db_path = .ambient_data/training/database/training_data.db
